<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profe IA - Chat Ecuaciones</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fa;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .chat-log {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .user-msg, .bot-msg {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .user-msg {
            background: #007bff;
            color: white;
            margin-left: auto;
        }
        .bot-msg {
            background: #e2e6ea;
            color: #333;
            margin-right: auto;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .latex {
            font-family: 'Courier New', monospace;
            background-color: #fff3cd;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>
<body>
    <div class="chat-container">
        <h2>📚 Profe IA - Chat de Ecuaciones</h2>

        <div class="chat-log">
            {% if pregunta %}
                <div class="user-msg">{{ pregunta }}</div>
            {% endif %}

            {% if respuesta %}
                <div class="bot-msg">{{ respuesta | safe }}</div>
            {% endif %}
        </div>

        <form method="post">
            <textarea name="pregunta" placeholder="Haz una pregunta sobre Ecuaciones Diferenciales..." required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
